<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Levantamento de Árvores Frutíferas - IFES</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #1a472a;
            --header-bg-green: #2e7d32;
            --secondary-green: #4a7c44;
            --earth-brown: #5d4037;
            --soft-beige: #f5f5f0;
            --accent-color: #8bc34a;
            --text-dark: #333;
            --white: #ffffff;
            --text-light: #e0e0e0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--soft-beige);
            color: var(--text-dark);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* --- HEADER RESPONSIVO --- */
        header {
            background-color: var(--header-bg-green);
            color: var(--white);
            padding: 4rem 1.5rem 5rem;
            text-align: center;
            background-image: linear-gradient(rgba(46, 125, 50, 0.85), rgba(46, 125, 50, 0.95)), url('https://images.unsplash.com/photo-1542273917363-3b1817f69a2d?ixlib=rb-4.0.3&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            border-bottom: 8px solid var(--accent-color);
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 5vw, 3.5rem); /* Tamanho de fonte fluido */
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            max-width: 800px;
            margin: 0 auto;
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            font-weight: 300;
            color: var(--text-light);
        }

        /* --- PESQUISA RESPONSIVA --- */
        .search-section {
            width: 100%;
            max-width: 600px;
            margin: -1.5rem auto 2.5rem;
            padding: 0 1rem;
            position: relative;
            z-index: 10;
        }

        .search-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-icon {
            position: absolute;
            left: 18px;
            color: var(--secondary-green);
            font-size: 1.1rem;
            pointer-events: none;
        }

        #searchInput {
            width: 100%;
            padding: 1.1rem 1rem 1.1rem 3.5rem;
            border-radius: 50px;
            border: 2px solid var(--accent-color);
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            outline: none;
            transition: all 0.3s ease;
        }

        #searchInput:focus {
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            border-color: var(--header-bg-green);
            transform: translateY(-2px);
        }

        /* --- GRID RESPONSIVO --- */
        main {
            max-width: 1200px;
            margin: 0 auto 5rem;
            padding: 0 1.5rem;
        }

        .grid {
            display: grid;
            /* No PC: colunas dinâmicas. No celular: 1 coluna. */
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .card {
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
        }

        .card-image {
            width: 100%;
            height: 240px;
            object-fit: cover;
            border-bottom: 5px solid var(--accent-color);
        }

        .card-content {
            padding: 1.8rem;
            flex-grow: 1;
        }

        .popular-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            color: var(--header-bg-green);
            margin-bottom: 0.3rem;
        }

        .scientific-name {
            font-style: italic;
            color: var(--earth-brown);
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 1.2rem;
            display: block;
        }

        .description {
            font-size: 0.95rem;
            color: #555;
            margin-bottom: 1.8rem;
        }

        .locations-title {
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--secondary-green);
            border-top: 1px solid #f0f0f0;
            padding-top: 1.2rem;
            margin-bottom: 0.8rem;
        }

        .location-item {
            font-size: 0.85rem;
            background: #fbfbfb;
            padding: 0.8rem;
            border-radius: 10px;
            margin-bottom: 0.6rem;
            border: 1px solid #f0f0ed;
        }

        .coords {
            display: block;
            color: #888;
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            margin-top: 4px;
        }

        /* --- RODAPÉ --- */
        footer {
            text-align: center;
            padding: 2rem 1.5rem;
            background-color: var(--header-bg-green);
            color: var(--white);
            border-top: 5px solid var(--accent-color);
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        /* --- AJUSTES PARA DISPOSITIVOS MÓVEIS --- */
        @media (max-width: 480px) {
            header { padding: 3rem 1rem 4rem; }
            header h1 { font-size: 1.8rem; }
            .grid { gap: 1.5rem; }
            .card-image { height: 200px; }
            .card-content { padding: 1.2rem; }
            .search-section { margin-top: -1.2rem; }
        }
    </style>
</head>
<body>

<header>
    <h1>Levantamento Botânico</h1>
    <p>Guia das árvores frutíferas do IFES – Campus Cachoeiro de Itapemirim. Conhecimento e valorização da nossa diversidade vegetal.</p>
</header>

<section class="search-section">
    <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Buscar árvore ou espécie..." onkeyup="filterTrees()">
    </div>
</section>

<main>
    <div id="tree-grid" class="grid">
        </div>
</main>

<footer>
    <p>&copy; 2026 Levantamento Acadêmico - Fundamentos de Sistemas de Informação</p>
</footer>

<script>
    const treeData = [

        "exemplares": [
            {"local": "entre o bloco 5 e 7", "lat": -20.802717, "lon": -41.154346},
            {"local": "entre o bloco 4 e 6", "lat": -20.802714, "lon": -41.154733}
        ]
      },
      {
        "cientifico": "Musa sp",
        "popular": "Bananeira",
        "descricao": "Produz cachos de banana, uma das frutas mais consumidas no campus.",
        "img": "https://mondiniplantas.cdn.magazord.com.br/img/2025/09/produto/7522/pe-de-banana-caturra-nanica.jpg?ims=800x800",
        "exemplares": [
            {"local": "atrás do bloco 5", "lat": -20.802906, "lon": -41.154133},
            {"local": "atrás do bloco 5", "lat": -20.802804, "lon": -41.154104}
        ]
      },
      {
        "cientifico": "Cocos nucifera",

        "img": "https://mondiniplantas.cdn.magazord.com.br/img/2025/08/produto/7441/pe-de-coco-da-bahia-anao.jpg?ims=425x425",
        "exemplares": [
            {"local": "bloco 10, perto da quadra", "lat": -20.802184, "lon": -41.154487},
            {"local": "atrás do bloco 10", "lat": -20.802274, "lon": -41.154550},
            {"local": "atrás do bloco 10", "lat": -20.802332, "lon": -41.154598}
        ]
      },
      {
        "cientifico": "Malpighia emarginata",
        "popular": "Pé de acerola",
        "descricao": "Arbusto frutífero pequeno, famoso pelo alto teor de vitamina C.",
        "img": "https://www.ibflorestas.org.br/wp-content/uploads/2018/07/Lista-de-especies-nativas.png",
        "exemplares": [{"local": "atrás do bloco 5", "lat": -20.802855, "lon": -41.154138}]
      },
      {
        "cientifico": "Citrus limon",
        "popular": "Pé de limão",
        "descricao": "Árvore cítrica produtora de frutos ácidos e aromáticos.",
        "img": "https://s2.glbimg.com/7-Svcn4YRRRHomfa6I00GxyvJS4=/e.glbimg.com/og/ed/f/original/2018/08/17/limao_limoeiro.jpg",
        "exemplares": [{"local": "atrás e entre o bloco 5 e 7", "lat": -20.802771, "lon": -41.154084}]
      },
      {
        "cientifico": "Mangifera indica",
        "popular": "Pé de manga",
        "descricao": "Árvore de grande porte que oferece sombra e frutos doces.",
        "img": "https://www.correiobraziliense.com.br/cbradar/wp-content/uploads/2025/04/manga-fruta_1743619509858.jpg",
        "exemplares": [
            {"local": "atrás do bloco 0", "lat": -20.803618, "lon": -41.155013},
            {"local": "frente do bloco 4", "lat": -20.802672, "lon": -41.154689}
        ]
      },
      {
        "cientifico": "Citrus sinensis",
        "popular": "Pé de laranja",
        "descricao": "Árvore cítrica amplamente cultivada pelo seu fruto rico em suco.",
        "img": "https://www.branco.com.br/content/dam/Branco/Latin%20America/Portuguese-BR/Images/newsroom/laranjas%2003.jpg",
        "exemplares": [{"local": "atrás do bloco 0", "lat": -20.803450, "lon": -41.154388}]
      },
      {
        "cientifico": "Psidium guajava",
        "popular": "Pé de goiaba",
        "descricao": "Árvore nativa com frutos aromáticos de polpa rosada ou branca.",
        "img": "https://cdnm.westwing.com.br/glossary/uploads/br/2023/10/03150050/pe-de-goiaba.jpg",

      },
      {
        "cientifico": "Citrus reticulata",
        "popular": "Pé de mexerica",
        "descricao": "Fruta cítrica de fácil manuseio e sabor doce característico.",

      },
      {
        "cientifico": "Anacardium occidentale",
        "popular": "Pé de caju",
        "descricao": "Nativa do Brasil, produz o pseudofruto suculento e a castanha.",
        "img": "https://www.cerratinga.org.br/site/wp-content/uploads/2021/09/caju-frutos-dodesign-s.jpg",
        "exemplares": [{"local": "atrás do bloco 0", "lat": -20.803595, "lon": -41.154238}]
      },
      {
        "cientifico": "Carica papaya",
        "popular": "Pé de mamão",
        "descricao": "Planta de crescimento rápido que produz mamões o ano todo.",
        "img": "https://ciclovivo.com.br/wp-content/uploads/2019/05/iStock-954115184-1024x683.jpg",
        "exemplares": [{"local": "atrás do bloco 0", "lat": -20.803644, "lon": -41.154798}]
      },
      {
        "cientifico": "Eugenia uniflora",
        "popular": "Pitangueira",
        "descricao": "Pequena árvore nativa que produz frutos vermelhos e refrescantes.",
        "img": "http://www.odairplantas.com.br/assets/img/produtos/123.jpg",
        "exemplares": [{"local": "frente do bloco 4", "lat": -20.802773, "lon": -41.154727}]
      }
    ];

    function renderTrees(data) {
        const grid = document.getElementById('tree-grid');
        grid.innerHTML = '';
        data.forEach(tree => {
            const card = document.createElement('div');
            card.className = 'card';
            
            const exemplaresHtml = tree.exemplares.map(ex => `
                <div class="location-item">
                    <strong>Local:</strong> ${ex.local}<br>
                    <span class="coords">Coord: ${ex.lat.toFixed(6)}, ${ex.lon.toFixed(6)}</span>
                </div>
            `).join('');

            card.innerHTML = `
                <img class="card-image" src="${tree.img}" alt="${tree.popular}" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1596547609652-9cf5d8d76921?auto=format&fit=crop&w=500'">
                <div class="card-content">
                    <h2 class="popular-name">${tree.popular}</h2>
                    <span class="scientific-name">${tree.cientifico}</span>
                    <p class="description">${tree.descricao}</p>
                    <h3 class="locations-title">📍 Localizações</h3>
                    ${exemplaresHtml}
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function filterTrees() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filtered = treeData.filter(tree => 
            tree.popular.toLowerCase().includes(query) || 
            tree.cientifico.toLowerCase().includes(query)
        );
        renderTrees(filtered);
    }

    // Inicialização
    document.addEventListener('DOMContentLoaded', () => renderTrees(treeData));
</script>

</body>
</html>
